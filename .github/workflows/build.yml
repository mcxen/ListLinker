name: Build All Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android
            os: ubuntu-latest
            setup: ""
            build-cmd: flutter build apk --release
            artifact-path: build/app/outputs/flutter-apk/*.apk

          - name: ios
            os: macos-latest
            setup: ""
            build-cmd: flutter build ios --no-codesign --release
            artifact-path: build/ios/iphoneos/Runner.app

          - name: macos
            os: macos-latest
            setup: ""
            build-cmd: flutter build macos --release
            artifact-path: build/macos/Build/Products/Release/*.app

          - name: windows
            os: windows-latest
            setup: ""
            build-cmd: flutter build windows --release
            artifact-path: build/windows/runner/Release/*.exe

          - name: linux
            os: ubuntu-latest
            setup: |
              sudo apt-get update -y
              sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
            build-cmd: flutter build linux --release
            artifact-path: build/linux/x64/release/bundle

          - name: web
            os: ubuntu-latest
            setup: ""
            build-cmd: flutter build web --release
            artifact-path: build/web

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Install system dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.build-cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-${{ matrix.name }}
          path: ${{ matrix.artifact-path }}
