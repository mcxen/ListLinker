name: Build All Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.7.12"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android
            os: ubuntu-latest
            setup: ""
            build-cmd: flutter build apk --release
            artifact-path: build/app/outputs/flutter-apk/*.apk

          - name: ios
            os: macos-latest
            setup: ""
            build-cmd: flutter build ios --no-codesign --release
            artifact-path: build/ios/iphoneos/Runner.app

          - name: macos
            os: macos-latest
            setup: ""
            build-cmd: flutter build macos --release
            artifact-path: build/macos/Build/Products/Release/*.app

          - name: windows
            os: windows-latest
            setup: ""
            build-cmd: flutter build windows --release
            artifact-path: build/windows/runner/Release/*.exe

          - name: linux
            os: ubuntu-latest
            setup: |
              sudo apt-get update -y
              sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
            build-cmd: flutter build linux --release
            artifact-path: build/linux/x64/release/bundle

          - name: web
            os: ubuntu-latest
            setup: ""
            build-cmd: flutter build web --release
            artifact-path: build/web

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          case "$RUNNER_OS" in
            macOS)
              FILE="flutter_macos_arm64_${FLUTTER_VERSION}-stable.zip"
              URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FILE}"
              curl -sL -o flutter.zip "$URL"
              unzip -q flutter.zip
              ;;
            Linux)
              FILE="flutter_linux_${FLUTTER_VERSION}-stable.tar.xz"
              URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/${FILE}"
              curl -sL -o flutter.tar.xz "$URL"
              tar xf flutter.tar.xz
              ;;
            Windows)
              FILE="flutter_windows_${FLUTTER_VERSION}-stable.zip"
              URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/${FILE}"
              curl -sL -o flutter.zip "$URL"
              7z x flutter.zip -y -bsp0 -bso0 > /dev/null
              ;;
          esac
          echo "$GITHUB_WORKSPACE/flutter/bin" >> "$GITHUB_PATH"
          mkdir -p "$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Run flutter doctor
        run: |
          flutter config --no-analytics
          flutter doctor

      - name: Install system dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Get Flutter packages
        run: |
          # Pin extended_image to a version compatible with Flutter 3.7.x
          flutter pub add extended_image:7.0.2 || true
          flutter pub get

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.build-cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-${{ matrix.name }}
          path: ${{ matrix.artifact-path }}