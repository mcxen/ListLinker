name: Build All Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android
            os: ubuntu-latest
            setup: ""
            download-file: flutter_linux_3.7.12-stable.tar.xz
            download-url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.7.12-stable.tar.xz
            extract: tar xf
            build-cmd: flutter build apk --release
            artifact-path: build/app/outputs/flutter-apk/*.apk

          - name: ios
            os: macos-latest
            setup: ""
            download-file: flutter_macos_3.7.12-stable.zip
            download-url: https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.7.12-stable.zip
            extract: unzip -q
            build-cmd: flutter build ios --no-codesign --release
            artifact-path: build/ios/iphoneos/Runner.app

          - name: macos
            os: macos-latest
            setup: ""
            download-file: flutter_macos_3.7.12-stable.zip
            download-url: https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.7.12-stable.zip
            extract: unzip -q
            build-cmd: flutter build macos --release
            artifact-path: build/macos/Build/Products/Release/*.app

          - name: windows
            os: windows-latest
            setup: ""
            download-file: flutter_windows_3.7.12-stable.zip
            download-url: https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.7.12-stable.zip
            extract: 7z x -y -bsp0 -bso0 > /dev/null
            build-cmd: flutter build windows --release
            artifact-path: build/windows/runner/Release/*.exe

          - name: linux
            os: ubuntu-latest
            setup: |
              sudo apt-get update -y
              sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
            download-file: flutter_linux_3.7.12-stable.tar.xz
            download-url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.7.12-stable.tar.xz
            extract: tar xf
            build-cmd: flutter build linux --release
            artifact-path: build/linux/x64/release/bundle

          - name: web
            os: ubuntu-latest
            setup: ""
            download-file: flutter_linux_3.7.12-stable.tar.xz
            download-url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.7.12-stable.tar.xz
            extract: tar xf
            build-cmd: flutter build web --release
            artifact-path: build/web

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          curl -sL -o ${{ matrix.download-file }} "${{ matrix.download-url }}"
          ${{ matrix.extract }} ${{ matrix.download-file }}
          echo "$GITHUB_WORKSPACE/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Run flutter doctor
        run: |
          flutter config --no-analytics
          flutter doctor

      - name: Install system dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.build-cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-${{ matrix.name }}
          path: ${{ matrix.artifact-path }}
