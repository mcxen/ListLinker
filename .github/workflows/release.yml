name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.24.0"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Android SDK 35
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" 2>&1 || true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate database code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate database code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build iOS
        run: flutter build ios --no-codesign --release

      - name: Create IPA archive
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r listlinker-ios.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-ios-ipa
          path: build/ios/iphoneos/listlinker-ios.ipa

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate database code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release

      - name: Create macOS archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r listlinker-macos.zip ListLinker.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-macos
          path: build/macos/Build/Products/Release/listlinker-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate database code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux --release

      - name: Create Linux archive
        run: |
          cd build/linux/x64/release
          tar czf listlinker-linux.tar.gz bundle

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-linux
          path: build/linux/x64/release/listlinker-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate database code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Windows archive
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip listlinker-windows.zip *
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-windows
          path: build/windows/x64/runner/Release/listlinker-windows.zip

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate database code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Create Web archive
        run: |
          cd build
          tar czf listlinker-web.tar.gz web

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: listlinker-web
          path: build/listlinker-web.tar.gz

  create-release:
    needs: [build-android, build-ios, build-macos, build-linux, build-windows, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            listlinker-android-apk/app-release.apk
            listlinker-ios-ipa/listlinker-ios.ipa
            listlinker-macos/listlinker-macos.zip
            listlinker-linux/listlinker-linux.tar.gz
            listlinker-windows/listlinker-windows.zip
            listlinker-web/listlinker-web.tar.gz
          generate_release_notes: true
